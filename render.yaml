services:
  - type: web
    name: cerebro-api
    env: python
    plan: free
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: cerebro-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: "https://cerebro-code-red.vercel.app"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: cerebro-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: cerebro-db
          property: connectionString

  - type: redis
    name: cerebro-redis
    plan: free
    ipAllowList: [] # only allow internal connections

databases:
  - name: cerebro-db
    databaseName: cerebro
    user: cerebro
    plan: free
